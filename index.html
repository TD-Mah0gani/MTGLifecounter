<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MTG Life Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- POPUP MENU -->
    <div id="menu-panel" class="hidden">
      <div class="menu-content">
        <button id="toggle-mode">Switch to 2 Player Mode</button>
        <button id="close-menu">Close</button>
      </div>
    </div>

    <!-- 4 PLAYER MODE (DEFAULT) -->
    <div id="four-player" class="four-grid">

      <!-- CENTER MENU BUTTON -->
      <button id="menu-btn" class="menu-btn">☰</button>

      <div class="quad" id="quad-p1">
        <div class="life" id="p1-life-4">40</div>
        <div class="buttons">
          <button data-player="p1" data-change="5">+5</button>
          <button data-player="p1" data-change="1">+1</button>
          <button class="reset-btn" data-player="p1" data-reset="true">⟲</button>
          <button data-player="p1" data-change="-1">−1</button>
          <button data-player="p1" data-change="-5">−5</button>
        </div>
        <h2 class="player-name">Player 1</h2>
      </div>

      <div class="quad" id="quad-p2">
        <div class="life" id="p2-life-4">40</div>
        <div class="buttons">
          <button data-player="p2" data-change="5">+5</button>
          <button data-player="p2" data-change="1">+1</button>
          <button class="reset-btn" data-player="p2" data-reset="true">⟲</button>
          <button data-player="p2" data-change="-1">−1</button>
          <button data-player="p2" data-change="-5">−5</button>
        </div>
        <h2 class="player-name">Player 2</h2>
      </div>

      <div class="quad" id="quad-p3">
        <div class="life" id="p3-life-4">40</div>
        <div class="buttons">
          <button data-player="p3" data-change="5">+5</button>
          <button data-player="p3" data-change="1">+1</button>
          <button class="reset-btn" data-player="p3" data-reset="true">⟲</button>
          <button data-player="p3" data-change="-1">−1</button>
          <button data-player="p3" data-change="-5">−5</button>
        </div>
        <h2 class="player-name">Player 3</h2>
      </div>

      <div class="quad" id="quad-p4">
        <div class="life" id="p4-life-4">40</div>
        <div class="buttons">
          <button data-player="p4" data-change="5">+5</button>
          <button data-player="p4" data-change="1">+1</button>
          <button class="reset-btn" data-player="p4" data-reset="true">⟲</button>
          <button data-player="p4" data-change="-1">−1</button>
          <button data-player="p4" data-change="-5">−5</button>
        </div>
        <h2 class="player-name">Player 4</h2>
      </div>

    </div>

    <!-- 2 PLAYER MODE -->
    <div id="two-player" class="hidden">
      
      <!-- CENTER MENU BUTTON -->
      <button class="menu-btn secondary-menu-button">☰</button>
      
      <div class="player">
        <div class="life" id="p1-life">40</div>
        <div class="buttons">
          <button data-player="p1" data-change="5">+5</button>
          <button data-player="p1" data-change="1">+1</button>
          <button class="reset-btn" data-player="p1" data-reset="true">⟲</button>
          <button data-player="p1" data-change="-1">−1</button>
          <button data-player="p1" data-change="-5">−5</button>
        </div>
        <h2 class="player-name">Player 1</h2>
      </div>

      <div class="player">
        <div class="life" id="p2-life">40</div>
        <div class="buttons">
          <button data-player="p2" data-change="5">+5</button>
          <button data-player="p2" data-change="1">+1</button>
          <button class="reset-btn" data-player="p2" data-reset="true">⟲</button>
          <button data-player="p2" data-change="-1">−1</button>
          <button data-player="p2" data-change="-5">−5</button>
        </div>
        <h2 class="player-name">Player 2</h2>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
