<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MTG Life Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HOME SCREEN -->
  <div id="home-screen">
    <h1 class="home-title">MTG Life Counter</h1>

    <div class="home-section">
      <label>Number of Players</label>
      <select id="player-count">
        <option value="2">2 Players</option>
        <option value="3">3 Players</option>
        <option value="4">4 Players</option>
        <option value="5">5 Players</option>
        <option value="6">6 Players</option>
      </select>
    </div>

    <div class="home-section">
      <label>Starting Life Total</label>
      <select id="starting-life">
        <option value="20">20 (Modern / Standard)</option>
        <option value="40">40 (Commander)</option>
        <option value="30">30 (Brawl)</option>
      </select>
    </div>

    <div class="home-section">
      <label>Game Type</label>
      <select id="game-type">
        <option value="commander">Commander</option>
        <option value="modern">Modern</option>
        <option value="standard">Standard</option>
        <option value="brawl">Brawl</option>
      </select>
    </div>

    <button id="start-game" class="home-start-btn">Start Game</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="hidden">
    <button id="menu-btn" class="menu-btn">☰</button>
    <div id="player-grid"></div>
  </div>

  <!-- MENU OVERLAY -->
  <div id="menu-panel" class="hidden">
    <div class="menu-content">
      <button id="reset-game">Reset Game</button>
      <button id="return-home">Return to Home Screen</button>
      <button id="close-menu">Close</button>
    </div>
  </div>

  <!-- PLAYER POPUP MENU -->
  <div id="player-menu" class="hidden">
    <div class="player-menu-content">
      <h2>Edit Player</h2>

      <label>Name</label>
      <input type="text" id="player-name-input">

      <label>Counters</label>
      <div id="counter-checkboxes">
        <label><input type="checkbox" value="Poison"> Poison</label>
        <label><input type="checkbox" value="Experience"> Experience</label>
        <label><input type="checkbox" value="Energy"> Energy</label>
        <label><input type="checkbox" value="Ticket"> Ticket</label>
      </div>

      <label>Background Image</label>
      <input type="file" id="bg-upload" accept="image/*">

      <button id="apply-player-settings">Apply</button>
      <button id="close-player-menu">Close</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
